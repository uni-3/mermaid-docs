name: Generate Mermaid Diagrams

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.mmd'
      - '**.md'
      - '.github/workflows/gen-svg.yml'

# Cancel superseded runs on the same PR.
concurrency:
  group: gen-svg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ICON_PACKAGES: '"@iconify-json/logos" "@iconify-json/mdi"'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Commit generated SVGs back onto the PR branch (not main).
        ref: ${{ github.head_ref }}
        # Full history so changed-files can diff against the base.
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v45
      with:
        files: |
          **/*.mmd
          **/*.md

    - name: Generate mermaid diagrams to svg
      if: steps.changed-files.outputs.any_changed == 'true'
      uses: uni-3/render-mermaid-svg@v1
      with:
        input-files: ${{ steps.changed-files.outputs.all_changed_files }}
        icon-packages: ${{ env.ICON_PACKAGES }}

    - name: Auto commit
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: Generate Mermaid diagrams for changed files
        file_pattern: '**/*.svg'
